name: Deploy Storybook to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v2
        with:
          version: 8.6.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Remove private registry config
        run: |
          echo "" > .npmrc
          rm -f pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile --ignore-scripts --no-optional --filter=@tarmac/tokens --filter=@tarmac/web-components --filter=storybook-vue...

      - name: Build tokens
        run: pnpm run build --filter=@tarmac/tokens

      - name: Build web components
        run: pnpm run build --filter=@tarmac/web-components

      - name: Build Storybook
        run: pnpm build-storybook
        working-directory: apps/storybook-vue

      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/storybook-vue/storybook-static

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
